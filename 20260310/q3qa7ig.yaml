mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  nameserver:
    - 223.5.5.5
    - 114.114.114.114
    - 119.29.29.29
    - 180.76.76.76
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - router.asus.com
    - localhost.sec.qq.com
    - localhost.ptlogin2.qq.com
    - +.msftconnecttest.com
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - 114.114.114.114
    - 180.76.76.76
    - 119.29.29.29
    - 223.5.5.5
    - 8.8.8.8
    - 8.8.4.4
    - 1.1.1.1
    - 1.0.0.1
proxies:
  - name: 橙子1
    type: vless
    server: n1732526138.lie5d.cyou
    port: 443
    uuid: 00ea4c5c-104e-434f-a126-29d34fa7bb0f
    network: ws
    tls: true
    ws-opts:
      path: /00ea4c5c-104e-434f-a126-29d34fa7bb0f
      headers:
        Host: n1732526138.lie5d.cyou
  - name: 橙子2
    type: vless
    server: n1753592003.74qxv.top
    port: 443
    uuid: 8585ffc4-7277-4da2-b3c1-a809c55f626e
    network: ws
    tls: true
    ws-opts:
      path: /8585ffc4-7277-4da2-b3c1-a809c55f626e
      headers:
        Host: n1753592003.74qxv.top
  - name: 橙子3
    type: vless
    server: n1753592000.wpg27.xyz
    port: 443
    uuid: 52293f2c-b172-45bd-a460-d0ce411db8d6
    network: ws
    tls: true
    ws-opts:
      path: /52293f2c-b172-45bd-a460-d0ce411db8d6
      headers:
        Host: n1753592000.wpg27.xyz
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT
      - 橙子1
      - 橙子2
      - 橙子3
  - name: ♻️ 自动选择
    type: url-test
    proxies:
      - 橙子1
      - 橙子2
      - 橙子3
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🎯 全球直连
      - 橙子1
      - 橙子2
      - 橙子3
  - name: 📲 电报信息
    type: select
    proxies:
      - 🚀 节点选择
      - 🎯 全球直连
      - 橙子1
      - 橙子2
      - 橙子3
  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - 🎯 全球直连
      - 🚀 节点选择
      - 橙子1
      - 橙子2
      - 橙子3
  - name: 🍎 苹果服务
    type: select
    proxies:
      - 🚀 节点选择
      - 🎯 全球直连
      - 橙子1
      - 橙子2
      - 橙子3
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择
  - name: 🛑 全球拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🍃 应用净化
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - 🎯 全球直连
      - ♻️ 自动选择
      - 橙子1
      - 橙子2
      - 橙子3
